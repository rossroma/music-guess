<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>猜歌名游戏</title>
  <link rel="stylesheet" href="game.css">
</head>
<body>

<!-- ===== 开始/配置视图 ===== -->
<div id="view-start" class="view active">
  <div class="start-container">
    <div class="start-header">
      <div class="logo">🎵</div>
      <h1>猜歌名游戏</h1>
      <p class="subtitle">听片段，拼歌名，挑战你的音乐记忆！</p>
    </div>

    <div class="config-card">
      <div class="config-section">
        <label class="config-label">年代</label>
        <div class="btn-group" id="era-group">
          <button class="chip active" data-value="any">不限</button>
          <button class="chip" data-value="2020-2026">近5年</button>
          <button class="chip" data-value="2010-2019">10年代</button>
          <button class="chip" data-value="2000-2009">00年代</button>
          <button class="chip" data-value="1990-1999">90年代</button>
          <button class="chip" data-value="pre-1990">更早</button>
        </div>
      </div>

      <div class="config-section">
        <label class="config-label">语言</label>
        <div class="btn-group" id="lang-group">
          <button class="chip active" data-value="any">不限</button>
          <button class="chip" data-value="zh">国语</button>
          <button class="chip" data-value="yue">粤语</button>
        </div>
      </div>

      <div class="config-section">
        <label class="config-label">歌手</label>
        <input type="text" id="artist-input" class="text-input" placeholder="留空则不限（例：周杰伦）">
      </div>
    </div>

    <div class="config-card">
      <div class="config-section">
        <label class="config-label">游戏模式</label>
        <div class="btn-group mode-group" id="mode-group">
          <button class="chip difficulty-chip active" data-value="challenge">
            <span class="diff-name">挑战</span>
            <span class="diff-time">猜歌名</span>
          </button>
          <button class="chip difficulty-chip" data-value="casual">
            <span class="diff-name">休闲</span>
            <span class="diff-time">无限听</span>
          </button>
        </div>
      </div>

      <div class="config-section">
        <label class="config-label">难度</label>
        <div class="btn-group difficulty-group" id="difficulty-group">
          <button class="chip difficulty-chip" data-value="easy">
            <span class="diff-name">简单</span>
            <span class="diff-time">30秒</span>
          </button>
          <button class="chip difficulty-chip active" data-value="medium">
            <span class="diff-name">中等</span>
            <span class="diff-time">20秒</span>
          </button>
          <button class="chip difficulty-chip" data-value="hard">
            <span class="diff-name">困难</span>
            <span class="diff-time">10秒</span>
          </button>
        </div>
      </div>
    </div>

    <button id="start-btn" class="primary-btn">开始游戏</button>
  </div>
</div>

<!-- ===== 加载视图 ===== -->
<div id="view-loading" class="view">
  <div class="loading-container">
    <div class="spinner"></div>
    <p class="loading-text">正在加载歌曲池…</p>
    <p class="loading-sub" id="loading-sub">搜索中，请稍候</p>
  </div>
</div>

<!-- ===== 游戏主视图 ===== -->
<div id="view-game" class="view">
  <div class="game-inner">

    <!-- 顶栏 -->
    <div class="game-header">
      <button id="exit-game-btn" class="exit-game-btn" style="display:none">← 返回</button>
      <span id="round-progress">第 1 / 10 首</span>
      <span id="score-display">得分: 0</span>
    </div>

    <!-- 专辑封面 -->
    <div class="cover-wrapper">
      <img id="album-cover" class="album-cover blurred" src="" alt="专辑封面">
      <div class="cover-overlay" id="cover-overlay">
        <span>🎵</span>
      </div>
    </div>

    <!-- 播放器 -->
    <div class="player-section">
      <div class="progress-bar-wrapper">
        <div class="progress-bar">
          <div id="audio-progress" class="progress-fill"></div>
        </div>
        <span id="time-display" class="time-text">0:00</span>
      </div>
      <div class="player-controls">
        <button id="replay-btn" class="replay-btn">↺ 重播</button>
        <span id="play-status" class="play-status">正在播放…</span>
      </div>
    </div>

    <!-- 歌名格子 -->
    <div class="slots-section">
      <div id="answer-slots" class="answer-slots"></div>
    </div>

    <!-- 休闲模式：查看歌曲信息 -->
    <div class="reveal-section" id="reveal-section" style="display:none">
      <button id="reveal-btn" class="reveal-info-btn">👁 查看歌曲信息</button>
      <div id="reveal-info" class="reveal-details" style="display:none">
        <div id="reveal-song-name" class="reveal-song-name"></div>
        <div id="reveal-artist" class="reveal-artist-name"></div>
      </div>
    </div>

    <!-- 弹性空白，将答题反馈和字池推至底部 -->
    <div class="game-spacer"></div>

    <!-- 下一首按钮（答题后显示） -->
    <div class="next-section" id="next-section" style="display:none">
      <div id="feedback-banner" class="feedback-banner"></div>
      <button id="next-btn" class="primary-btn">下一首 ▶</button>
    </div>

    <!-- 备选字池：固定在底部 -->
    <div class="char-pool-section">
      <div id="char-pool" class="char-pool"></div>
    </div>

  </div>
</div>

<!-- ===== 结算视图 ===== -->
<div id="view-result" class="view">
  <div class="result-container">
    <h2 class="result-title">游戏结束！</h2>

    <div class="score-display-large">
      <div class="score-block">
        <div class="score-number" id="final-score">0</div>
        <div class="score-label">本局得分</div>
      </div>
      <div class="score-divider"></div>
      <div class="score-block">
        <div class="score-number" id="high-score-display">0</div>
        <div class="score-label">历史最高 🏆</div>
      </div>
    </div>

    <div id="new-record-banner" class="new-record hidden">🎉 新纪录！</div>

    <div class="history-list" id="history-list"></div>

    <div class="result-actions">
      <button id="play-again-btn" class="primary-btn">再来一局</button>
      <button id="change-filter-btn" class="secondary-btn">修改筛选条件</button>
    </div>
  </div>
</div>

<!-- 横屏提示 -->
<div id="landscape-tip" class="landscape-tip">
  <p>📱 请竖屏游玩</p>
</div>

<audio id="game-audio"></audio>

<script src="game.js"></script>
</body>
</html>
