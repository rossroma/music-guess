<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spotify Demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="currentColor" width="32" height="32">
          <path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/>
        </svg>
        <span>Spotify Demo</span>
      </div>
    </header>

    <main class="main">
      <div class="search-section">
        <div class="search-bar">
          <input
            type="text"
            id="searchInput"
            placeholder="搜索专辑、歌曲、歌单或歌手..."
            autocomplete="off"
          />
          <button id="searchBtn" class="btn-primary">搜索</button>
        </div>
        <div class="type-tabs">
          <button class="tab active" data-type="tracks">歌曲</button>
          <button class="tab" data-type="albums">专辑</button>
          <button class="tab" data-type="playlists">歌单</button>
          <button class="tab" data-type="artists">歌手</button>
        </div>
      </div>

      <div class="results-section">
        <div id="loading" class="loading hidden">搜索中...</div>
        <div id="error" class="error hidden"></div>
        <div id="results" class="results"></div>
      </div>
    </main>

    <!-- Audio Player -->
    <div id="player" class="player hidden">
      <div class="player-info">
        <img id="playerCover" src="" alt="cover" class="player-cover" />
        <div class="player-meta">
          <div id="playerTitle" class="player-title"></div>
          <div id="playerArtist" class="player-artist"></div>
        </div>
      </div>
      <div class="player-controls">
        <button id="playPauseBtn" class="play-pause-btn" title="播放/暂停">
          <svg id="playIcon" viewBox="0 0 24 24" fill="currentColor" width="28" height="28">
            <path d="M8 5v14l11-7z"/>
          </svg>
          <svg id="pauseIcon" viewBox="0 0 24 24" fill="currentColor" width="28" height="28" class="hidden">
            <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
          </svg>
        </button>
        <div class="progress-bar-wrap">
          <span id="currentTime" class="time">0:00</span>
          <div class="progress-bar" id="progressBar">
            <div class="progress-fill" id="progressFill"></div>
          </div>
          <span id="duration" class="time">0:30</span>
        </div>
        <div class="volume-wrap">
          <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
            <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
          </svg>
          <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="1" />
        </div>
        <button id="closePlayer" class="close-btn" title="关闭">✕</button>
      </div>
      <audio id="audioEl"></audio>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
